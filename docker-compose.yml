services:
  app:
    build:
      context: .
    container_name: property-management-app
    ports:
      - "${PORT:-3000}:${PORT:-3000}"
    env_file:
      - v.env
    environment:
      - NODE_ENV=${NODE_ENV:-production}
      - PORT=${PORT:-3000}
      - JWT_SECRET=${JWT_SECRET:-shinigami_secret_key_change_me_in_production}
      - DATABASE_URL=/app/data/shinigami.db
    volumes:
      - ./data:/app/data
    restart: always

volumes:
  data:
